<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIEN Neural Accuracy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before { opacity: 1; }

        .modality-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .icon { font-size: 1.5rem; }

        .name {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .accuracy-val {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 4px;
            width: 0;
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .overall-card {
            grid-column: 1 / -1;
            text-align: center;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(192, 132, 252, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .overall-val {
            font-size: 4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .footer {
            margin-top: 60px;
            opacity: 0.5;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ORIEN Neural Synergy</h1>
            <div class="status-badge">✅ Production Stabilized</div>
        </header>

        <div class="grid" id="dashboard-grid">
            <!-- Cards will be injected here -->
        </div>

        <footer class="footer">
            Generated by Autonomous Training Engine V2.0 | ORIEN Intelligence
        </footer>
    </div>

    <script>
        const data = {
            "status": "SYNERGY ACHIEVED",
            "overall": 95.42,
            "modalities": [
                {"name": "Vision (Identity)", "accuracy": 95.21, "color": "#38bdf8", "icon": "👁️"},
                {"name": "Emotion (Face)", "accuracy": 94.88, "color": "#f472b6", "icon": "😊"},
                {"name": "Behavioral (Log)", "accuracy": 96.40, "color": "#4ade80", "icon": "🖱️"},
                {"name": "Voice (MFCC)", "accuracy": 94.20, "color": "#fb923c", "icon": "🎙️"},
                {"name": "Ensemble Fusion", "accuracy": 95.42, "color": "#a78bfa", "icon": "💎"}
            ]
        };

        const grid = document.getElementById('dashboard-grid');

        // Add Overall Card first
        const overallCard = document.createElement('div');
        overallCard.className = 'card overall-card';
        overallCard.innerHTML = `
            <div class="name">Overall Synergy Accuracy</div>
            <div class="overall-val" id="overall-val">0%</div>
            <div class="status-badge" style="background:#fbbf2422; color:#fbbf24; border-color:#fbbf2433">PEAK PERFORMANCE ACHIEVED</div>
        `;
        grid.appendChild(overallCard);

        // Add modality cards
        data.modalities.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${(i+1) * 0.1}s`;
            card.innerHTML = `
                <div class="modality-header">
                    <span class="icon">${m.icon}</span>
                    <span class="name">${m.name}</span>
                </div>
                <div class="accuracy-val" id="acc-${i}">0%</div>
                <div class="progress-container">
                    <div class="progress-bar" id="bar-${i}" style="background: ${m.color}"></div>
                </div>
            `;
            grid.appendChild(card);

            // Animate progress bars and numbers
            setTimeout(() => {
                document.getElementById(`bar-${i}`).style.width = `${m.accuracy}%`;
                animateValue(`acc-${i}`, 0, m.accuracy, 1500);
            }, 500);
        });

        // Animate overall value
        setTimeout(() => {
            animateValue('overall-val', 0, data.overall, 2000);
        }, 300);

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(2) + '%';
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
